<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chameleon Royal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #050505; color: #00ffcc; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; overflow: hidden; }
        .machine { background: #111; padding: 25px; border: 4px solid #00ffcc; border-radius: 25px; display: inline-block; width: 90%; max-width: 380px; margin-top: 20px; box-shadow: 0 0 20px #00ffcc44; }
        .display { font-size: 35px; background: #000; padding: 20px; border-radius: 15px; margin: 20px 0; color: #fff; border: 2px solid #333; }
        .btn-spin { background: #00ffcc; color: #000; border: none; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 20px; width: 100%; cursor: pointer; box-shadow: 0 5px #008866; }
        .btn-spin:active { transform: translateY(4px); box-shadow: 0 1px #008866; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="machine">
        <h1 style="margin:0; font-size: 22px;">🦎 CHAMELEON ROYAL</h1>
        <div class="stats">
            <div>BALANCE:<br><span id="balance">5000</span> CC</div>
            <div>COST:<br>100</div>
        </div>
        <div id="slot" class="display">🦎 | 💎 | 💰</div>
        <button id="spinBtn" class="btn-spin" onclick="play()">SPIN NOW</button>
        <div id="log" style="margin-top:15px; font-weight:bold">Good luck, Dev!</div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let balance = 5000;
        const symbols = ['🦎', '💎', '💰', '🔥', '🚀'];
        const spinSound = new Audio('https://www.soundjay.com/misc/sounds/mechanical-clonk-1.mp3');
        const winSound = new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');

        function play() {
            if (balance < 100) { tg.showAlert("No balance!"); return; }
            balance -= 100;
            document.getElementById('balance').innerText = balance;
            document.getElementById('spinBtn').disabled = true;
            document.getElementById('log').innerText = "SPINNING...";
            spinSound.play();
            tg.HapticFeedback.impactOccurred('heavy');
            let i = 0;
            const iv = setInterval(() => {
                const s = [symbols[Math.floor(Math.random()*5)], symbols[Math.floor(Math.random()*5)], symbols[Math.floor(Math.random()*5)]];
                document.getElementById('slot').innerText = s.join(' | ');
                if (i++ > 15) {
                    clearInterval(iv);
                    document.getElementById('spinBtn').disabled = false;
                    if (s[0] === s[1] && s[1] === s[2]) {
                        balance += 2000; winSound.play();
                        document.getElementById('log').innerText = "JACKPOT! +2000";
                    } else { document.getElementById('log').innerText = "TRY AGAIN!"; }
                    document.getElementById('balance').innerText = balance;
                }
            }, 100);
        }
    </script>
</body>
</html>
